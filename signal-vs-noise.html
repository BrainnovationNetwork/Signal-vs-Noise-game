<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Signal vs. Noise | Brainnovation</title>
<meta name="theme-color" content="#0d1420">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ff-display:'Playfair Display',Georgia,serif;
  --ff-body:'Outfit',system-ui,sans-serif;
  --bg:#0d1420;--surface:rgba(255,255,255,0.04);--surface-raised:rgba(255,255,255,0.07);
  --text:#E6E7E8;--text-dim:rgba(230,231,232,0.52);--text-faint:rgba(230,231,232,0.22);
  --signal:#6DCDB8;--signal-glow:rgba(109,205,184,0.18);
  --noise:#E06287;--noise-glow:rgba(224,98,135,0.18);
  --gold:#F1B434;--blue:#407EC9;--lb:#8BD3E6;
  --r-sm:12px;--r-md:16px;--r-lg:20px;--r-xl:28px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --t-spring:0.45s cubic-bezier(0.34,1.56,0.64,1);
  --t-ease:0.4s cubic-bezier(0.25,0.1,0.25,1);
  --t-out:0.3s cubic-bezier(0.4,0,1,1);
  --t-atm:1.1s cubic-bezier(0.25,0.1,0.25,1);
}

/* iframe-safe: full height chain without dvh dependency */
html{height:100%;height:-webkit-fill-available;}
body{height:100%;height:-webkit-fill-available;
  overflow:hidden;
  font-family:var(--ff-body);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  -webkit-text-size-adjust:100%;-moz-text-size-adjust:100%;text-size-adjust:100%;
  overscroll-behavior:none;user-select:none;-webkit-user-select:none;}

/* ── GRAIN — absolute not fixed (iframe safe) ── */
.grain{position:absolute;top:0;left:0;right:0;bottom:0;z-index:9999;
  pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px;}

/* ── PROGRESS — absolute not fixed ── */
.prog-track{position:absolute;top:0;left:0;right:0;height:2px;
  background:rgba(255,255,255,0.04);z-index:300}
.prog-fill{height:100%;width:0;
  background:linear-gradient(90deg,var(--signal),var(--blue),var(--gold));
  transition:width 0.6s cubic-bezier(0.25,0.1,0.25,1);position:relative;}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-3px;
  width:8px;height:8px;border-radius:50%;background:var(--text);
  box-shadow:0 0 10px 3px rgba(230,231,232,0.35);}

/* ── DECK — iframe-safe height ── */
.deck{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden}
/* will-change scoped only to animating slides — avoids GPU pressure on low-end mobile */
.slide{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--safe-top) + 2rem) 1.5rem calc(var(--safe-bot) + 2rem);
  text-align:center;opacity:0;pointer-events:none;z-index:1;
  transform:translateY(28px) scale(0.98);transition:none;}
.slide.active{opacity:1;pointer-events:auto;transform:none;z-index:10}
.slide.entering{will-change:transform,opacity;transition:opacity 0.55s cubic-bezier(0.25,0.1,0.25,1),
  transform 0.55s cubic-bezier(0.25,0.1,0.25,1)}
.slide.exiting-up{will-change:transform,opacity;opacity:0;transform:translateY(-36px) scale(0.97);z-index:5;
  transition:opacity 0.38s var(--t-out),transform 0.38s var(--t-out);}
.slide.exiting-down{will-change:transform,opacity;opacity:0;transform:translateY(36px) scale(0.97);z-index:5;
  transition:opacity 0.38s var(--t-out),transform 0.38s var(--t-out);}

/* Atmosphere */
.atm{will-change:opacity;position:absolute;top:0;left:0;right:0;bottom:0;
  transition:opacity var(--t-atm);opacity:0;pointer-events:none;z-index:0}
.atm.on{opacity:1}

/* Stagger children */
.slide.active .sg{opacity:0;animation:sgIn 0.5s forwards}
@keyframes sgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slide.active .sg:nth-child(1){animation-delay:.06s}
.slide.active .sg:nth-child(2){animation-delay:.13s}
.slide.active .sg:nth-child(3){animation-delay:.21s}
.slide.active .sg:nth-child(4){animation-delay:.30s}
.slide.active .sg:nth-child(5){animation-delay:.38s}
.slide.active .sg:nth-child(6){animation-delay:.46s}
.slide.active .sg:nth-child(7){animation-delay:.54s}

button{-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;}
button:focus-visible{outline:2px solid var(--signal);outline-offset:3px}

/* ════════════════════════════════
   HERO
════════════════════════════════ */
.hero-inner{position:relative;z-index:2;max-width:600px;width:100%}
.hero-logo{height:40px;width:auto;margin-bottom:2.2rem;display:block;margin-left:auto;margin-right:auto;}
.hero-eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:.9rem}
.hero-title{font-family:var(--ff-display);font-size:clamp(2.8rem,9vw,5.2rem);
  line-height:1.05;font-weight:400;margin-bottom:1.4rem;}
.hero-title em{font-style:italic;color:var(--signal)}
.hero-sub{font-size:clamp(.9rem,2.5vw,1.05rem);color:var(--text-dim);
  line-height:1.8;font-weight:300;max-width:420px;margin:0 auto 2.6rem;}
.hero-cta{display:inline-flex;align-items:center;gap:.55rem;
  padding:.85rem 1.9rem;border-radius:100px;
  background:rgba(230,231,232,.05);border:1px solid rgba(230,231,232,.11);
  color:var(--text);font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.hero-cta:hover{background:rgba(230,231,232,.09);border-color:rgba(230,231,232,.2);transform:translateY(-1px)}
.hero-cta:active{transform:scale(.96)}
.hero-cta svg{transition:transform .3s}
.hero-cta:hover svg{transform:translateX(3px)}
.hero-ref{font-size:.64rem;color:var(--text-faint);font-style:italic;margin-top:1.4rem}

/* ════════════════════════════════
   HOW TO PLAY
════════════════════════════════ */
.howto-inner{position:relative;z-index:2;max-width:480px;width:100%}
.howto-label{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:1rem}
.howto-title{font-family:var(--ff-display);font-size:clamp(1.7rem,5vw,2.4rem);
  line-height:1.15;font-weight:400;margin-bottom:1.8rem;}
.rules{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.rule{display:flex;align-items:flex-start;gap:.9rem;padding:.8rem 1rem;
  border:1px solid rgba(255,255,255,.05);border-radius:var(--r-md);
  background:var(--surface);text-align:left;}
.rule-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-top:.05rem}
.rule-dot.go{background:rgba(109,205,184,.12);border:1px solid rgba(109,205,184,.22)}
.rule-dot.no{background:rgba(224,98,135,.12);border:1px solid rgba(224,98,135,.22)}
.rule-dot.time{background:rgba(241,180,52,.12);border:1px solid rgba(241,180,52,.22)}
.rule-copy{font-size:.82rem;line-height:1.55;color:var(--text-dim);font-weight:300}
.rule-copy strong{color:var(--text);font-weight:500}
.howto-btn{display:inline-flex;align-items:center;gap:.55rem;
  padding:.85rem 1.9rem;border-radius:100px;
  background:rgba(109,205,184,.07);border:1px solid rgba(109,205,184,.2);
  color:var(--signal);font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.howto-btn:hover{background:rgba(109,205,184,.13);border-color:rgba(109,205,184,.35);transform:translateY(-1px)}
.howto-btn:active{transform:scale(.96)}

/* ════════════════════════════════
   LEVEL CARD (stripped down)
════════════════════════════════ */
.lv-inner{position:relative;z-index:2;max-width:400px;width:100%}
.lv-num{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:1rem}
.lv-name{font-family:var(--ff-display);font-size:clamp(2.2rem,7vw,3.4rem);
  line-height:1.08;font-weight:400;margin-bottom:.7rem;}
.lv-tagline{font-family:var(--ff-display);font-style:italic;
  font-size:clamp(.9rem,2.5vw,1.05rem);color:var(--text-dim);margin-bottom:2.8rem;}
.lv-pills{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-bottom:2.6rem}
.lv-pill{font-size:.65rem;font-weight:500;padding:.28rem .75rem;
  border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim)}
.lv-btn{display:inline-flex;align-items:center;gap:.55rem;
  padding:.85rem 2rem;border-radius:100px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:var(--text);font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.lv-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
.lv-btn:active{transform:scale(.96)}

/* ════════════════════════════════
   GAME SCREEN — full redesign
════════════════════════════════ */
.game-slide{
  padding:0;justify-content:flex-start;overflow:hidden;
}

/* Top bar */
.g-bar{
  position:relative;z-index:2;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + .9rem) 1.4rem .5rem;
  flex-shrink:0;
}
.g-bar-label{font-size:.58rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint)}
.g-bar-right{display:flex;align-items:center;gap:.6rem}
.g-pill{font-size:.68rem;font-weight:500;padding:.25rem .65rem;
  border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim);}
.g-pill b{color:var(--text);font-weight:600}

/* ── TARGET ZONE — the star of the show ── */
.target-zone{
  position:relative;z-index:2;width:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:.6rem 1.4rem .3rem;
  flex-shrink:0;
}
.target-eyebrow{
  font-size:.52rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:.6rem;
}
.target-capsule{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  padding:.55rem 2rem;
  border-radius:100px;
  border:1.5px solid rgba(109,205,184,.25);
  background:rgba(109,205,184,.06);
  min-width:180px;
  transition:border-color .3s,background .3s;
}
.target-word{
  font-family:var(--ff-display);
  font-size:clamp(1.6rem,5vw,2.2rem);
  font-weight:600;letter-spacing:.04em;
  color:var(--signal);
  transition:color .25s,transform .2s;
}
.target-word.swap{animation:wordSwap .22s cubic-bezier(0.4,0,0.2,1)}
@keyframes wordSwap{
  0%{opacity:1;transform:translateY(0)}
  45%{opacity:0;transform:translateY(-6px)}
  55%{opacity:0;transform:translateY(7px)}
  100%{opacity:1;transform:translateY(0)}
}
.target-cat{font-size:.62rem;color:var(--text-faint);margin-top:.35rem;letter-spacing:.06em}

/* ── TIMER ARC — dominant visual element ── */
.arc-zone{
  position:relative;z-index:2;
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:.2rem 0 .1rem;flex-shrink:0;
}
.arc-svg{transform:rotate(-90deg);overflow:visible}
.arc-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:4}
.arc-fill{
  fill:none;stroke-width:4;stroke-linecap:round;
  transition:stroke .35s ease,stroke-dashoffset .08s linear;
}
.arc-center-label{
  position:absolute;top:0;left:0;right:0;bottom:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  font-family:var(--ff-display);font-size:1.6rem;font-weight:600;
  transition:color .3s;pointer-events:none;
}

/* ── TILE GRID — considered layout ── */
.tile-zone{
  position:relative;z-index:2;
  flex:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:0 1rem;min-height:0;
}
.tile-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:.55rem;
  width:100%;max-width:400px;
}
.tile{
  touch-action:manipulation;
  position:relative;overflow:hidden;
  min-height:52px;
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  padding:.6rem .4rem;
  border-radius:var(--r-md);
  border:1px solid rgba(255,255,255,.07);
  background:var(--surface);
  font-family:var(--ff-body);
  font-size:.84rem; /* fallback for browsers without clamp */
  font-size:clamp(.78rem,2.2vw,.92rem);
  font-weight:400;
  color:var(--text-dim);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s,border-color .15s,color .15s,transform .12s;
}
.tile:hover{border-color:rgba(255,255,255,.13);color:var(--text);background:var(--surface-raised)}
.tile:active{transform:scale(.93)}

/* Tile states */
.tile.in{animation:tileIn .28s cubic-bezier(0.34,1.2,0.64,1) forwards}
@keyframes tileIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

.tile.correct{
  border-color:rgba(109,205,184,.55);
  background:rgba(109,205,184,.1);
  color:var(--signal);
  animation:tileCorrect .38s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes tileCorrect{
  0%{transform:scale(.95)}40%{transform:scale(1.08)}70%{transform:scale(.97)}100%{transform:scale(1)}
}
.tile.wrong{
  border-color:rgba(224,98,135,.5);
  background:rgba(224,98,135,.09);
  color:var(--noise);
  animation:tileWrong .3s ease;
}
@keyframes tileWrong{
  0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}75%{transform:translateX(-3px)}
}

/* Tile shimmer on correct */
.tile.correct::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(120deg,transparent 30%,rgba(109,205,184,.18) 50%,transparent 70%);
  animation:shimmer .5s ease forwards;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)} }

/* ── INHIBIT BAR ── */
.inhibit-zone{
  position:relative;z-index:2;width:100%;
  padding:0 1.4rem calc(var(--safe-bot) + .7rem);
  flex-shrink:0;
}
.inhibit-head{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.35rem;}
.inhibit-lbl{font-size:.52rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.inhibit-val{font-size:.65rem;font-weight:600;color:var(--text-dim);transition:color .3s}
.inhibit-track{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.inhibit-bar{height:100%;border-radius:2px;transform-origin:left;transform:scaleX(0.5);
  background:linear-gradient(90deg,var(--noise),var(--gold) 50%,var(--signal));
  transition:transform .5s cubic-bezier(0.25,0.1,0.25,1)}

/* ════════════════════════════════
   RESULT SCREEN
════════════════════════════════ */
.result-inner{
  position:relative;z-index:2;
  width:100%;max-width:420px;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  gap:0;
  max-height:calc(100vh - 4rem);
  max-height:calc(100dvh - 4rem);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scrollbar-width:none;-ms-overflow-style:none;
  padding-bottom:.5rem;
}
.result-inner::-webkit-scrollbar{display:none}
.res-eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:1.2rem;}
/* Score ring */
.score-ring-wrap{position:relative;width:170px;height:170px;flex-shrink:0;margin-bottom:1.2rem}
.score-ring-svg{transform:rotate(-90deg);overflow:visible}
.score-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:6}
.score-fill{fill:none;stroke-width:6;stroke-linecap:round;
  stroke-dasharray:471.24;stroke-dashoffset:471.24;
  transition:stroke-dashoffset 1.3s cubic-bezier(0.25,0.1,0.25,1) .2s,stroke .4s}
.score-center{position:absolute;top:0;left:0;right:0;bottom:0;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:1px;}
.score-num{font-family:var(--ff-display);font-size:2.8rem;font-weight:600;line-height:1}
.score-denom{font-size:.6rem;color:var(--text-faint);letter-spacing:.08em}
/* Grade */
.res-grade-label{font-family:var(--ff-display);font-size:1.5rem;font-weight:600;
  line-height:1.1;margin-bottom:.25rem}
.res-grade-sub{font-size:.78rem;color:var(--text-dim);font-weight:300;margin-bottom:1.4rem}
/* Stats row */
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;width:100%;margin-bottom:1.2rem}
.res-stat{background:var(--surface);border:1px solid rgba(255,255,255,.05);
  border-radius:var(--r-md);padding:.75rem .5rem;text-align:center;}
.res-stat-n{font-family:var(--ff-display);font-size:1.6rem;font-weight:600;line-height:1}
.res-stat-l{font-size:.56rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-faint);margin-top:.25rem}
/* Insight */
.res-insight{width:100%;padding:.8rem 1rem;margin-bottom:1.3rem;
  border-left:2px solid var(--signal);background:rgba(109,205,184,.03);text-align:left;}
.res-insight-lbl{font-size:.52rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--signal);margin-bottom:.3rem}
.res-insight-txt{font-size:.8rem;line-height:1.6;color:var(--text-dim);font-weight:300}
/* ── Benchmark strip ── */
.bench-wrap{width:100%;margin-bottom:1.3rem;}
.bench-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.55rem;}
.bench-title{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint)}
.bench-source{font-size:.48rem;color:var(--text-faint);font-style:italic;opacity:.7}
/* The spectrum bar */
.bench-bar-outer{position:relative;height:8px;border-radius:100px;overflow:visible;margin-bottom:.5rem;
  background:linear-gradient(90deg,
    rgba(224,98,135,.55) 0%,
    rgba(224,98,135,.3) 18%,
    rgba(241,180,52,.45) 36%,
    rgba(139,211,230,.4) 58%,
    rgba(109,205,184,.65) 80%,
    rgba(109,205,184,.9) 100%
  );}
/* Zone tick marks */
.bench-ticks{position:absolute;top:0;left:0;right:0;bottom:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;pointer-events:none}
.bench-tick{position:absolute;width:1px;height:14px;top:-3px;background:rgba(13,20,32,.6)}
/* Marker */
.bench-marker{
  position:absolute;top:50%;
  width:18px;height:18px;
  border-radius:50%;
  border:2.5px solid var(--bg);
  transform:translate(-50%,-50%) scale(0);
  transition:left 1.1s cubic-bezier(0.34,1.2,0.64,1) .5s,
             background .4s ease .5s,
             transform .5s cubic-bezier(0.34,1.56,0.64,1) .45s;
  z-index:2;
  /* Glow ring */
  box-shadow:0 0 0 4px rgba(255,255,255,.08);
}
.bench-marker.placed{transform:translate(-50%,-50%) scale(1)}
/* Pulse ring on marker */
.bench-marker::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1px solid currentColor;opacity:0;
  animation:markerPulse 2.4s ease-in-out infinite 1.2s;
}
@keyframes markerPulse{
  0%,100%{opacity:0;transform:scale(1)}
  40%{opacity:.35;transform:scale(1.5)}
  70%{opacity:0;transform:scale(1.9)}
}
/* Zone labels below bar */
.bench-labels{display:flex;justify-content:space-between;position:relative;margin-top:.25rem}
.bench-zone-lbl{font-size:.46rem;font-weight:500;color:var(--text-faint);text-align:center;
  position:absolute;transform:translateX(-50%);white-space:nowrap;letter-spacing:.02em;}
/* Active zone callout */
.bench-callout{
  margin-top:1rem;
  padding:.7rem .9rem;
  border-radius:var(--r-md);
  background:var(--surface);
  border:1px solid rgba(255,255,255,.06);
  text-align:left;
  position:relative;overflow:hidden;
}
.bench-callout-zone{font-size:.5rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:.28rem;transition:color .4s}
.bench-callout-text{font-size:.76rem;line-height:1.55;color:var(--text-dim);font-weight:300}
.bench-callout-disclaimer{font-size:.58rem;color:var(--text-faint);font-style:italic;
  margin-top:.5rem;line-height:1.45;}
/* Left accent driven by box-shadow inset set in JS */
.bench-callout::before{display:none}

/* ── History — level result sparkline ── */
.hist-level-wrap{
  width:100%;margin-bottom:1.2rem;
  padding:.75rem 1rem;
  border-radius:var(--r-md);
  background:var(--surface);
  border:1px solid rgba(255,255,255,.05);
}
.hist-level-head{
  display:-webkit-flex;display:flex;
  -webkit-justify-content:space-between;justify-content:space-between;
  -webkit-align-items:center;align-items:center;
  margin-bottom:.65rem;
}
.hist-level-label{
  font-size:.5rem;font-weight:600;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text-faint);
}
.hist-level-trend{
  font-size:.62rem;font-weight:600;
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;gap:.25rem;
}
.hist-sparkline-row{
  display:-webkit-flex;display:flex;
  -webkit-align-items:flex-end;align-items:flex-end;
  -webkit-justify-content:center;justify-content:center;
  gap:.55rem;
  height:52px;
  position:relative;
}
/* SVG sparkline line */
.hist-sparkline-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  overflow:visible;pointer-events:none;
}
.hist-spark-path{
  fill:none;stroke:rgba(255,255,255,.1);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;
}
.hist-spark-path.current{stroke:var(--signal);stroke-width:2;}
/* Individual session columns */
.hist-session-col{
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  gap:.3rem;
  -webkit-flex:1;flex:1;
  max-width:72px;
  position:relative;z-index:1;
}
.hist-session-col.is-current .hist-bar{
  background:var(--signal);
  box-shadow:0 0 8px rgba(109,205,184,.3);
}
.hist-bar{
  width:100%;
  border-radius:4px 4px 0 0;
  background:rgba(255,255,255,.1);
  min-height:3px;
  transition:height .6s cubic-bezier(0.34,1.2,0.64,1);
}
.hist-score-lbl{
  font-family:var(--ff-display);
  font-size:.82rem;font-weight:600;
  line-height:1;
}
.hist-session-col.is-current .hist-score-lbl{color:var(--signal);}
.hist-date-lbl{
  font-size:.42rem;color:var(--text-faint);
  white-space:nowrap;letter-spacing:.03em;
}
.hist-now-badge{
  font-size:.38rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:var(--signal);background:rgba(109,205,184,.1);
  border:1px solid rgba(109,205,184,.2);
  border-radius:100px;padding:.15rem .4rem;
  margin-top:.1rem;
}

/* ── History — final screen full panel ── */
.hist-final-wrap{width:100%;margin-bottom:1.8rem;}
.hist-final-title{
  font-size:.5rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:.75rem;text-align:left;
}
.hist-session-row{
  background:var(--surface);
  border:1px solid rgba(255,255,255,.05);
  border-radius:var(--r-md);
  padding:.75rem .9rem;
  margin-bottom:.5rem;
  position:relative;
  overflow:hidden;
}
.hist-session-row.is-current{
  border-color:rgba(109,205,184,.22);
  background:rgba(109,205,184,.04);
}
.hist-session-row.is-current::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;
  background:var(--signal);border-radius:2px 0 0 2px;
}
.hist-row-top{
  display:-webkit-flex;display:flex;
  -webkit-justify-content:space-between;justify-content:space-between;
  -webkit-align-items:baseline;align-items:baseline;
  margin-bottom:.45rem;
}
.hist-row-score{
  font-family:var(--ff-display);font-size:1.4rem;font-weight:600;line-height:1;
}
.hist-row-meta{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:.5rem;
}
.hist-row-date{font-size:.52rem;color:var(--text-faint);}
.hist-row-tag{
  font-size:.44rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:.18rem .5rem;border-radius:100px;
}
.hist-row-tag.now{
  color:var(--signal);background:rgba(109,205,184,.1);
  border:1px solid rgba(109,205,184,.2);
}
.hist-row-tag.prev{
  color:var(--text-faint);background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
}
.hist-level-chips{
  display:-webkit-flex;display:flex;
  gap:.35rem;flex-wrap:wrap;
}
.hist-lv-chip{
  font-size:.52rem;font-weight:500;
  padding:.2rem .55rem;border-radius:100px;
  border:1px solid rgba(255,255,255,.07);
  color:var(--text-faint);
}
.hist-lv-chip.good{
  border-color:rgba(109,205,184,.25);color:var(--signal);
}
.hist-trend-badge{
  display:-webkit-inline-flex;display:inline-flex;
  -webkit-align-items:center;align-items:center;
  gap:.3rem;
  font-size:.6rem;font-weight:600;
  padding:.3rem .7rem;border-radius:100px;
  margin-bottom:.9rem;
  border:1px solid rgba(255,255,255,.06);
  background:var(--surface);
  color:var(--text-dim);
}
.hist-trend-badge.up{color:var(--signal);border-color:rgba(109,205,184,.2);background:rgba(109,205,184,.05);}
.hist-trend-badge.down{color:var(--noise);border-color:rgba(224,98,135,.2);background:rgba(224,98,135,.05);}
.hist-no-history{
  font-size:.75rem;color:var(--text-faint);font-style:italic;
  text-align:center;padding:.5rem 0;
}

/* Actions */
.res-actions{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;width:100%}
.btn-primary{display:inline-flex;align-items:center;gap:.45rem;
  padding:.78rem 1.5rem;border-radius:100px;
  background:rgba(109,205,184,.08);border:1px solid rgba(109,205,184,.22);
  color:var(--signal);font-family:var(--ff-body);font-size:.8rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.btn-primary:hover{background:rgba(109,205,184,.14);border-color:rgba(109,205,184,.38);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.96)}
.btn-ghost{display:inline-flex;align-items:center;gap:.45rem;
  padding:.78rem 1.1rem;border-radius:100px;
  border:1px solid rgba(255,255,255,.07);background:transparent;
  color:var(--text-dim);font-family:var(--ff-body);font-size:.8rem;font-weight:400;
  cursor:pointer;touch-action:manipulation;transition:border-color var(--t-ease),color var(--t-ease),transform var(--t-ease);}
.btn-ghost:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.btn-ghost:active{transform:scale(.96)}

/* ════════════════════════════════
   FINAL SCREEN
════════════════════════════════ */
.final-inner{position:relative;z-index:2;max-width:500px;width:100%;
  max-height:calc(100vh - 4rem);
  max-height:calc(100dvh - 4rem);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scrollbar-width:none;-ms-overflow-style:none;}
.final-inner::-webkit-scrollbar{display:none}
.final-rule{width:44px;height:1px;background:rgba(255,255,255,.12);margin:0 auto 1.8rem}
.final-title{font-family:var(--ff-display);font-size:clamp(2rem,6vw,3.2rem);
  line-height:1.1;font-weight:400;margin-bottom:1.6rem;}
.final-title em{font-style:italic;color:var(--signal)}
.final-big{font-family:var(--ff-display);font-size:clamp(4rem,14vw,7rem);
  font-weight:600;line-height:1;margin-bottom:.2rem}
.final-big-lbl{font-size:.62rem;color:var(--text-faint);letter-spacing:.18em;text-transform:uppercase;margin-bottom:1.6rem}
.final-chips{display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin-bottom:1.6rem}
.chip{font-size:.66rem;font-weight:500;padding:.28rem .72rem;
  border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim)}
.chip.good{border-color:rgba(109,205,184,.28);color:var(--signal);background:rgba(109,205,184,.05)}
.final-insights{list-style:none;margin-bottom:2rem}
.final-insights li{font-size:.88rem;color:var(--text-dim);line-height:1.75;font-weight:300;
  padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.final-insights li:last-child{border-bottom:none}
.final-cta{display:inline-flex;align-items:center;gap:.5rem;
  padding:.88rem 1.8rem;border-radius:100px;
  background:rgba(109,205,184,.07);border:1px solid rgba(109,205,184,.22);
  color:var(--signal);font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);
  text-decoration:none;}
.final-cta:hover{background:rgba(109,205,184,.14);border-color:rgba(109,205,184,.38);transform:translateY(-1px)}
.final-cta:active{transform:scale(.96)}
.final-logo{height:26px;width:auto;opacity:.3;margin-top:1.8rem;display:block;
  margin-left:auto;margin-right:auto;}

/* ════════════════════════════════
   OVERLAYS
════════════════════════════════ */
/* Feedback flash — absolute for iframe safety */
.fb-flash{position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:4000;opacity:0}
.fb-flash.hit{background:radial-gradient(ellipse at 50% 40%,rgba(109,205,184,.14) 0%,transparent 65%)}
.fb-flash.miss{background:radial-gradient(ellipse at 50% 40%,rgba(224,98,135,.14) 0%,transparent 65%)}
.fb-flash.fire{opacity:1;transition:opacity .08s ease;animation:fbFade .45s ease forwards}
@keyframes fbFade{0%{opacity:1}100%{opacity:0}}

/* Combo toast — absolute for iframe safety */
.combo-toast{position:absolute;top:22%;left:50%;transform:translateX(-50%);
  font-family:var(--ff-display);font-size:1.5rem;font-weight:600;color:var(--gold);
  pointer-events:none;z-index:5000;opacity:0;white-space:nowrap;}
.combo-toast.show{animation:comboAnim .95s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes comboAnim{
  0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.8)}
  20%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.1)}
  55%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  85%{opacity:.7;transform:translateX(-50%) translateY(-12px) scale(.92)}
  100%{opacity:0;transform:translateX(-50%) translateY(-22px) scale(.85)}
}

/* Countdown — absolute for iframe safety */
.countdown-wrap{position:absolute;top:0;left:0;right:0;bottom:0;z-index:8000;
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  pointer-events:none;opacity:0;}
.countdown-wrap.on{opacity:1}
.countdown-n{font-family:var(--ff-display);font-size:clamp(5rem,18vw,9rem);
  font-weight:600;opacity:0;}
.countdown-n.pop{animation:cntPop .62s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes cntPop{
  0%{opacity:0;transform:scale(.45)}25%{opacity:1;transform:scale(1.18)}
  55%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.82)}}

/* Sparkle particles — absolute for iframe safety */
.spark{position:absolute;pointer-events:none;z-index:9000;
  width:5px;height:5px;border-radius:50%;opacity:0;}
.spark.go{animation:sparkGo .7s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes sparkGo{
  0%{opacity:0;transform:translate(0,0) scale(0)}
  20%{opacity:1;transform:translate(calc(var(--dx)*.3),calc(var(--dy)*.3)) scale(1)}
  80%{opacity:.7;transform:translate(var(--dx),var(--dy)) scale(.8)}
  100%{opacity:0;transform:translate(calc(var(--dx)*1.35),calc(var(--dy)*1.35)) scale(0)}}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  .slide.entering,.slide.exiting-up,.slide.exiting-down{transition:opacity .2s!important;transform:none!important}
  .slide.active .sg{animation:none!important;opacity:1!important}
  .tile.in,.tile.correct,.tile.wrong{animation:none!important}
  .combo-toast,.countdown-n,.spark{animation:none!important;opacity:0!important}
  .target-word{animation:none!important}
  .score-fill{transition:stroke-dashoffset .4s,stroke .2s!important}
  .bench-marker{transition:left .4s,background .2s,transform .3s!important}
}
</style>
</head>

const rnd=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

function vibrate(pattern){

function scoreGrade(p){
  if(p>=90)return{label:'Elite',color:'var(--signal)',desc:'Exceptional inhibitory control. Your prefrontal cortex is efficiently filtering signal from noise.'}
  if(p>=75)return{label:'Strong',color:'var(--lb)',desc:'Strong performance. You\'re suppressing lures effectively — a real executive function win.'}
  if(p>=60)return{label:'Good',color:'var(--gold)',desc:'Solid foundation. Consistent practice will sharpen your response inhibition further.'}
  if(p>=45)return{label:'Building',color:'var(--noise)',desc:'This is exactly where training lives. Each session carves the circuit deeper.'}
  return{label:'Warming Up',color:'var(--text-dim)',desc:'Every expert started here. Your inhibitory network is beginning to learn.'}
}

function dPrimeScore(hits,misses,fa,cr){
  const total=hits+misses+fa+cr;
  if(!total)return 0;
  const hr=hits/(hits+misses||1);
  const far=fa/(fa+cr||1);
  return Math.round(clamp((hr-far+1)/2*100,0,100));
}

// ─── SPARKLES — deck-relative coords for iframe safety ───────────────────
const SPARK_COLS=['#6DCDB8','#8BD3E6','#F1B434','#E06287','#407EC9'];
function sparks(el,n=8){
  const deck=$('deck');
  if(!deck)return;
  const deckRect=deck.getBoundingClientRect();
  const r=el.getBoundingClientRect();
  // Offset relative to deck, not viewport
  const cx=r.left-deckRect.left+r.width/2;
  const cy=r.top-deckRect.top+r.height/2;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='spark';
    const a=(Math.PI*2/n)*i+(Math.random()-.5)*.7;
    const d=28+Math.random()*38;
    p.style.left=(cx-2.5)+'px';p.style.top=(cy-2.5)+'px';
    p.style.background=SPARK_COLS[i%SPARK_COLS.length];
    p.style.setProperty('--dx',Math.cos(a)*d+'px');
    p.style.setProperty('--dy',Math.sin(a)*d+'px');
    p.style.animationDelay=(i*.028)+'s';
    deck.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('go'));
    setTimeout(()=>p.remove(),750);
  }
}

}

function showCombo(n){
  const el=$('comboToast');

  el.className='combo-toast show';
  setTimeout(()=>el.className='combo-toast',1000);
}

// ─── SLIDE TRANSITION ────────────────────────────────────────────────────
function jumpTo(idx,dir=1){
  if(transitioning)return;
  const all=document.querySelectorAll('.slide');
  const curr=all[slideIdx],nxt=all[idx];
  if(!nxt)return;
  transitioning=true;
  curr.classList.remove('active');
  curr.classList.add(dir>0?'exiting-up':'exiting-down');
  nxt.querySelectorAll('.sg').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
  nxt.style.transform=`translateY(${dir>0?28:-28}px) scale(.98)`;
  nxt.style.opacity='0';
  nxt.classList.add('entering');
  requestAnimationFrame(()=>{
    nxt.classList.add('active');
    nxt.style.transform='';
    nxt.style.opacity='';
  });
  slideIdx=idx;
  $('progFill').style.width=(idx/(slides.length-1)*100)+'%';
  setTimeout(()=>{
    curr.classList.remove('exiting-up','exiting-down');
    nxt.classList.remove('entering');
    transitioning=false;
  },580);
}

function go(dir){jumpTo(slideIdx+dir,dir)}

// ─── BUILD HTML ──────────────────────────────────────────────────────────
function buildSlides(){
  const deck=$('deck');
  slides.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    if(s.t==='game')div.classList.add('game-slide');
    div.dataset.idx=i;
    if(s.t==='hero')div.innerHTML=htmlHero();
    else if(s.t==='howto')div.innerHTML=htmlHowto();
    else if(s.t==='lvcard')div.innerHTML=htmlLvCard(s.lv);
    else if(s.t==='game')div.innerHTML=htmlGame(s.lv);
    else if(s.t==='result')div.innerHTML=htmlResult(s.lv,s.i);
    else if(s.t==='final')div.innerHTML=htmlFinal();
    deck.appendChild(div);
  });
}

// ─── GAME ENGINE ─────────────────────────────────────────────────────────
function startGame(lvIdx){
  // Fix: cancel any running timer RAF before resetting state
  cancelAnimationFrame(gs.timerRaf);
  gs.timerRaf=null;

  // Reset state
  Object.assign(gs,{lvIdx,trial:0,hits:0,misses:0,fa:0,cr:0,rt:[],
    combo:0,maxCombo:0,score:0,answered:true}); // answered:true blocks stale tile clicks

  // Navigate to game slide
  const gameSlideIdx=slides.findIndex(s=>s.t==='game'&&s.lv.num===lvIdx+1);
  const dir=gameSlideIdx>slideIdx?1:-1;
  transitioning=false;
  const all=document.querySelectorAll('.slide');
  all[slideIdx].classList.remove('active');
  all[slideIdx].classList.add(dir>0?'exiting-up':'exiting-down');
  all[gameSlideIdx].style.transform=`translateY(${dir>0?28:-28}px) scale(.98)`;
  all[gameSlideIdx].style.opacity='0';
  all[gameSlideIdx].classList.add('entering');
  requestAnimationFrame(()=>{
    all[gameSlideIdx].classList.add('active');
    all[gameSlideIdx].style.transform='';
    all[gameSlideIdx].style.opacity='';
  });
  const prev=slideIdx;
  slideIdx=gameSlideIdx;
  $('progFill').style.width=(slideIdx/(slides.length-1)*100)+'%';
  setTimeout(()=>{
    all[prev].classList.remove('exiting-up','exiting-down');
    all[gameSlideIdx].classList.remove('entering');
    transitioning=false;
    // Countdown then play
    setTimeout(()=>countdown(()=>trial(lvIdx)),200);
  },580);
}

function countdown(cb){
  const wrap=$('cntWrap'),el=$('cntN');
  wrap.classList.add('on');
  let n=3;
  const tick=()=>{
    el.textContent=n>0?n:'GO';
    el.style.color=n>0?'var(--text-faint)':'var(--signal)';
    el.className='countdown-n pop';
    setTimeout(()=>el.className='countdown-n',560);
    if(n===0){
      setTimeout(()=>{wrap.classList.remove('on');cb();},630);
    }else{n--;setTimeout(tick,660);}
  };
  tick();
}

function trial(lvIdx){
  const lv=LEVELS[lvIdx];
  if(gs.trial>=lv.trials){endLevel(lvIdx);return;}

  const isSignal=Math.random()>lv.noiseRatio;
  const target=rnd(lv.targets);
  gs.currentTarget=target;
  gs.answered=false;
  gs.trialStart=now(); // consistent with performance.now() arcTick

  // Animate target word swap
  const tw=$(`tword${lvIdx}`);
  if(tw){
    tw.classList.remove('swap');
    tw.offsetHeight;
    tw.classList.add('swap');
    setTimeout(()=>{tw.textContent=target;},110);
  }

  // Update trial counter
  const tn=$(`gtrial${lvIdx}`);
  if(tn)tn.textContent=gs.trial+1;

  // Build 9 tiles
  const pool=buildPool(lv,target,isSignal);
  gs.tiles=pool;
  const grid=$(`tgrid${lvIdx}`);
  if(!grid)return;
  const btns=grid.querySelectorAll('.tile');
  btns.forEach((btn,i)=>{
    const item=pool[i];
    btn.textContent=item.word;
    btn.dataset.sig=item.sig;
    btn.className='tile in';
    btn.style.animationDelay=(i*.04)+'s';
    btn.setAttribute('aria-label',item.word);
    btn.disabled=false;
    btn.style.pointerEvents=''; // reset from any previous tap
    setTimeout(()=>btn.classList.remove('in'),350+i*40);
  });

  // Start arc timer
  cancelAnimationFrame(gs.timerRaf);
  const total=lv.window*1000;
  gs.timerTotal=total;
  gs.timerStart=now();
  const arc=$(`garc${lvIdx}`);
  const timelabel=$(`gtime${lvIdx}`);
  const R=76,C=2*Math.PI*R;

  function arcTick(ts){
    const elapsed=ts-gs.timerStart;
    const frac=clamp(1-elapsed/total,0,1);
    const offset=C*(1-frac);
    if(arc){
      arc.style.strokeDashoffset=offset.toFixed(1);
      arc.style.stroke=frac>.5?'var(--signal)':frac>.25?'var(--gold)':'var(--noise)';
    }
    if(timelabel){
      const secs=Math.ceil((total-elapsed)/1000);
      timelabel.textContent=Math.max(0,secs);
      timelabel.style.color=frac>.25?'var(--text)':'var(--noise)';
    }
    if(frac>0&&!gs.answered){
      gs.timerRaf=requestAnimationFrame(arcTick);
    }else if(!gs.answered){
      // Timed out
      if(isSignal)gs.misses++;
      else gs.cr++;
      gs.combo=0;
      gs.trial++;
      updateInhibit(lvIdx);
      setTimeout(()=>trial(lvIdx),180);
    }
  }
  gs.timerRaf=requestAnimationFrame(arcTick);
}

function buildPool(lv,target,isSignal){
  const pool=[];
  const nSig=isSignal?Math.floor(Math.random()*2)+1:0;
  for(let i=0;i<nSig;i++)pool.push({word:target,sig:true});
  const used=new Set([target]);
  while(pool.length<9){
    let w,tries=0;
    do{w=Math.random()<.55?rnd(lv.lures):rnd(lv.targets.filter(t=>t!==target));tries++;}
    while(used.has(w)&&tries<25);
    used.add(w);
    pool.push({word:w,sig:false});
  }
  return shuffle(pool);
}

function onTile(lvIdx,tileIdx){
  if(gs.answered||gs.lvIdx!==lvIdx)return;
  const item=gs.tiles[tileIdx];
  if(!item)return;

  cancelAnimationFrame(gs.timerRaf);
  gs.timerRaf=null;
  gs.answered=true;
  const rt=Math.round(now()-gs.trialStart); // consistent units, rounded
  gs.rt.push(rt);

  const btn=$(`t${lvIdx}_${tileIdx}`);
  // Immediately disable to block ghost clicks on Android
  if(btn){btn.disabled=true;btn.style.pointerEvents='none';}

  if(item.sig){
    gs.hits++;
    gs.combo++;
    if(gs.combo>gs.maxCombo)gs.maxCombo=gs.combo;
    if(btn){btn.classList.add('correct');btn.disabled=true;}
    sparks(btn,10);
    flash('hit');
    vibrate(40);
    const pts=10+Math.floor(gs.combo/3)*3;
    gs.score=Math.max(0,gs.score+pts);
    const se=$(`gscore${lvIdx}`);
    if(se)se.textContent=gs.score;
    // Animate target capsule
    const cap=$(`tcap${lvIdx}`);
    if(cap){cap.style.borderColor='rgba(109,205,184,.55)';cap.style.background='rgba(109,205,184,.1)';
      setTimeout(()=>{cap.style.borderColor='';cap.style.background='';},300);}
    if(gs.combo>=3)showCombo(gs.combo);
  }else{
    gs.fa++;
    gs.combo=0;
    if(btn){btn.classList.add('wrong');btn.disabled=true;}
    flash('miss');
    vibrate([30,40,30]);
    gs.score=Math.max(0,gs.score-5);
    const se=$(`gscore${lvIdx}`);
    if(se)se.textContent=gs.score;
  }

  gs.trial++;
  updateInhibit(lvIdx);
  setTimeout(()=>trial(lvIdx),380);
}

function updateInhibit(lvIdx){
  const score=dPrimeScore(gs.hits,gs.misses,gs.fa,gs.cr);
  const fill=$(`ginhibit${lvIdx}`);
  const pct=$(`ginhpct${lvIdx}`);
  if(fill)fill.style.transform=`scaleX(${score/100})`;
  if(pct){
    pct.textContent=score+'%';
    pct.style.color=score>=70?'var(--signal)':score>=50?'var(--gold)':'var(--noise)';
  }
}

function endLevel(lvIdx){
  cancelAnimationFrame(gs.timerRaf);
  gs.timerRaf=null;
  // Capture stats NOW before any state reset can happen
  const hits=gs.hits,fa=gs.fa,misses=gs.misses,cr=gs.cr,rt=[...gs.rt];
  const score=dPrimeScore(hits,misses,fa,cr);
  const avgRt=rt.length?Math.round(rt.reduce((a,b)=>a+b,0)/rt.length):0;
  const grade=scoreGrade(score);
  gs.lvResults[lvIdx]={score,hits,fa,avgRt,grade};

  vibrate([40,60,80]);

  const resultIdx=slides.findIndex(s=>s.t==='result'&&s.i===lvIdx);
  setTimeout(()=>{
    transitioning=false;
    const all=document.querySelectorAll('.slide');
    all[slideIdx].classList.remove('active');
    all[slideIdx].classList.add('exiting-up');
    all[resultIdx].querySelectorAll('.sg').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
    all[resultIdx].style.transform='translateY(28px) scale(.98)';
    all[resultIdx].style.opacity='0';
    all[resultIdx].classList.add('entering');
    requestAnimationFrame(()=>{
      all[resultIdx].classList.add('active');
      all[resultIdx].style.transform='';
      all[resultIdx].style.opacity='';
    });
    const prev=slideIdx;slideIdx=resultIdx;
    $('progFill').style.width=(slideIdx/(slides.length-1)*100)+'%';
    setTimeout(()=>{
      all[prev].classList.remove('exiting-up');
      all[resultIdx].classList.remove('entering');
      populateResult(lvIdx,score,avgRt,grade,hits,fa);
    },590);
  },420);
}

// ─── BENCHMARK DATA ──────────────────────────────────────────────────────
const BENCHMARKS=[
  {min:0,  max:39,
   zone:'Clinical Range',     color:'#E06287',  dPrime:'d\u2032 < 1.5',
   text:'Scores here are consistent with populations showing significant inhibitory control challenges \u2014 common in unmedicated ADHD, high cognitive load, or a completely unfamiliar session.'},
  {min:40, max:54,
   zone:'Below Average',      color:'#c97850',  dPrime:'d\u2032 1.5\u20132.0',
   text:'Below the typical first-session range for healthy adults. Fatigue, distraction, or an unfamiliar task format can produce scores here. Practice produces the most rapid gains at this level.'},
  {min:55, max:69,
   zone:'First Session Range',color:'#F1B434',  dPrime:'d\u2032 2.0\u20132.5',
   text:'The typical range for healthy adults on their first go/no-go session. You\u2019re performing at the expected baseline \u2014 consistent practice moves scores up this band reliably.'},
  {min:70, max:84,
   zone:'Healthy Adult Range',color:'#8BD3E6',  dPrime:'d\u2032 2.5\u20133.0',
   text:'Solidly within the range published for healthy, practised adults. Your prefrontal cortex is efficiently suppressing lure responses \u2014 a meaningful executive function benchmark.'},
  {min:85, max:100,
   zone:'Trained Adult Range',color:'#6DCDB8',  dPrime:'d\u2032 \u2265 3.0',
   text:'Above the typical healthy adult range, consistent with trained or high-performing individuals in published go/no-go studies. Elite inhibitory control.'},
];

function getBenchmark(score){
  return BENCHMARKS.find(b=>score>=b.min&&score<=b.max)||BENCHMARKS[0];
}

function populateResult(lvIdx,score,avgRt,grade,hits,fa){
  // ── Score ring — Fix 11: exact circumference 2π×75 = 471.239 ──
  const CIRC=471.24;
  const arc=$(`rarc${lvIdx}`);
  if(arc){
    arc.style.stroke=grade.color;
    setTimeout(()=>{arc.style.strokeDashoffset=((CIRC*(1-score/100)).toFixed(2));},120);
  }
  const numEl=$(`rnum${lvIdx}`);
  if(numEl){numEl.textContent=score;numEl.style.color=grade.color;}

  const gl=$(`rgrade${lvIdx}`);
  if(gl){gl.textContent=grade.label;gl.style.color=grade.color;}

  const gs2=$(`rgradeSub${lvIdx}`);
  if(gs2)gs2.textContent=LEVELS[lvIdx].name+' \u2014 Level '+(lvIdx+1);

  // ── Level history sparkline ──
  // Small delay so the ring animation has started before we paint history
  setTimeout(()=>renderLevelHistory(lvIdx,score),300);

  // Fix 7: use passed-in hits/fa, not gs global (prevents stale data on retry)
  const hi=$(`rhits${lvIdx}`);
  if(hi)hi.textContent=hits;

  const faEl=$(`rfa${lvIdx}`);
  if(faEl){faEl.textContent=fa;faEl.style.color=fa===0?'var(--signal)':'var(--noise)';}

  const rt=$(`rrt${lvIdx}`);
  if(rt)rt.innerHTML=avgRt+'<span style="font-size:.7rem;color:var(--text-faint)">ms</span>';

  // ── Benchmark strip ──
  const bench=getBenchmark(score);

  // Fix 20: clamp marker to 2%–98% so it never clips at edges
  const markerPct=clamp(score,2,98);

  const marker=$(`benchmarker${lvIdx}`);
  if(marker){
    // Fix 10: pre-position marker at final location BEFORE making it visible
    // This prevents the flash-from-left-edge on slow devices
    marker.style.left=markerPct+'%';
    marker.style.background=bench.color;
    marker.style.color=bench.color;
    // Now trigger the scale-in with a slight delay after ring starts
    setTimeout(()=>marker.classList.add('placed'),550);
  }

  // Fix 9: callout styling — never mutate cssText, use individual style properties only
  const callout=$(`benchcallout${lvIdx}`);
  if(callout){
    callout.style.borderColor=bench.color+'33';
    callout.style.boxShadow='inset 2.5px 0 0 0 '+bench.color;
  }

  const zoneEl=$(`benchzone${lvIdx}`);
  if(zoneEl){
    zoneEl.textContent=bench.zone+' \u00B7 '+bench.dPrime;
    zoneEl.style.color=bench.color;
  }

  const textEl=$(`benchtext${lvIdx}`);
  if(textEl)textEl.textContent=bench.text;

  // ── Actions ──
  const act=$(`ract${lvIdx}`);
  if(act){
    const isLast=lvIdx===LEVELS.length-1;
    act.innerHTML=isLast
      ?`<button class="btn-primary" onclick="sparks(this);setTimeout(doFinal,100)">Final Score <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M5 2l5 5-5 5"/></svg></button>
         <button class="btn-ghost" onclick="sparks(this);setTimeout(()=>startGame(${lvIdx}),100)">Retry</button>`
      :`<button class="btn-primary" onclick="sparks(this);setTimeout(()=>toLvCard(${lvIdx+1}),100)">Level ${lvIdx+2} <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M5 2l5 5-5 5"/></svg></button>
         <button class="btn-ghost" onclick="sparks(this);setTimeout(()=>startGame(${lvIdx}),100)">Retry</button>`;
  }
}

function toLvCard(lvIdx){
  const ci=slides.findIndex(s=>s.t==='lvcard'&&s.lv.num===lvIdx+1);
  transitioning=false;jumpTo(ci,1);
}

function doFinal(){
  const fi=slides.findIndex(s=>s.t==='final');
  transitioning=false;jumpTo(fi,1);
  setTimeout(()=>{
    const results=gs.lvResults.filter(Boolean);
    const avg=results.length?Math.round(results.reduce((a,r)=>a+r.score,0)/results.length):0;
    const grade=scoreGrade(avg);

    // Build level scores array (null for any level not played)
    const levelScores=LEVELS.map((_,i)=>gs.lvResults[i]?gs.lvResults[i].score:null);

    // Commit this session to history BEFORE rendering final history
    // so renderFinalHistory reads the previous sessions correctly
    histCommit(avg,levelScores);

    const fb=$('fbig');
    if(fb){fb.textContent=avg;fb.style.color=grade.color;}
    const fc=$('fchips');
    if(fc)fc.innerHTML=results.map((r,i)=>`<span class="chip${r.score>=60?' good':''}">${LEVELS[i].name}: ${r.score}</span>`).join('');

    // ── Final history panel ──
    renderFinalHistory(avg,levelScores);

    const fi2=$('finsights');
    if(fi2){
      const lines=avg>=80
        ?['Elite go/no-go performance','Prefrontal inhibition circuits firing efficiently','This level of control transfers to real-world regulation']
        :avg>=60
        ?['Strong inhibitory control with room to grow','Consistent practice sharpens false-alarm resistance','You\'re building the neural circuits that matter']
        :['All four levels completed \u2014 that takes commitment','Inhibitory control is trainable \u2014 it grows with reps','Return regularly to see measurable improvement'];
      fi2.innerHTML=lines.map(l=>`<li>${l}</li>`).join('');
    }
  },620);
}

// ═══════════════════════════════════════════════════════════
// ─── SESSION HISTORY ENGINE ─────────────────────────────────
// Stores last 3 complete sessions in localStorage.
// Gracefully fails silently if localStorage is unavailable
// (private mode, quota exceeded, cross-origin iframe restrictions).
// ═══════════════════════════════════════════════════════════

const HIST_KEY='brainnovation_svn_v1';
const HIST_MAX=3;

function histLoad(){
  try{
    const raw=localStorage.getItem(HIST_KEY);
    if(!raw)return[];
    const parsed=JSON.parse(raw);
    return Array.isArray(parsed)?parsed:[];
  }catch(e){return[];}
}

function histSave(sessions){
  try{localStorage.setItem(HIST_KEY,JSON.stringify(sessions));}
  catch(e){/* silent — private mode or quota */}
}

// Called at end of a full game (doFinal) to commit this session
function histCommit(overallScore,levelScores){
  const prev=histLoad();
  const entry={
    ts:Date.now(),
    overall:overallScore,
    levels:levelScores  // array of scores indexed by level (0-3)
  };
  // Prepend newest, cap at HIST_MAX
  const next=[entry,...prev].slice(0,HIST_MAX);
  histSave(next);
  return next;
}

// ── Helpers ──────────────────────────────────────────────────
function histFormatDate(ts){
  if(!ts)return'';
  const d=new Date(ts);
  const now=new Date();
  const diffDays=Math.floor((now-d)/86400000);
  if(diffDays===0)return'Today';
  if(diffDays===1)return'Yesterday';
  if(diffDays<7)return diffDays+'d ago';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

function histTrendArrow(curr,prev){
  if(prev==null)return null;
  const diff=curr-prev;
  if(Math.abs(diff)<3)return{dir:'flat',label:'\u2192 Same',cls:''};
  if(diff>0)return{dir:'up',label:'\u2191 +'+diff,cls:'up'};
  return{dir:'down',label:'\u2193 '+diff,cls:'down'};
}

// ── Level result sparkline ────────────────────────────────────
// Shows this level's scores across up to 3 sessions (prev sessions + current)
function renderLevelHistory(lvIdx,currentScore){
  const container=$('histlv'+lvIdx);
  if(!container)return;

  const history=histLoad(); // previous completed sessions
  // Build array: older → newer → current
  // Each entry: {score, ts, isCurrent}
  const pts=[];
  // Pull up to (HIST_MAX-1) previous sessions that have this level
  for(let i=Math.min(history.length,HIST_MAX-1)-1;i>=0;i--){
    const s=history[i];
    const sc=s.levels&&s.levels[lvIdx]!=null?s.levels[lvIdx]:null;
    if(sc!=null)pts.push({score:sc,ts:s.ts,isCurrent:false});
  }
  pts.push({score:currentScore,ts:Date.now(),isCurrent:true});

  // Only show if there's at least 1 previous session for this level
  if(pts.length<2){container.innerHTML='';return;}

  const MAX_H=36; // max bar height in px
  const scores=pts.map(p=>p.score);
  const maxScore=Math.max(...scores,1);

  // Trend vs most recent previous
  const trend=pts.length>=2?histTrendArrow(currentScore,pts[pts.length-2].score):null;

  // Build column HTML
  const cols=pts.map((p,i)=>{
    const barH=Math.max(3,Math.round((p.score/100)*MAX_H));
    const isCurr=p.isCurrent;
    return`<div class="hist-session-col${isCurr?' is-current':''}">
      <div class="hist-score-lbl" style="${isCurr?'color:var(--signal)':'color:var(--text-faint)'}">${p.score}</div>
      <div class="hist-bar" style="height:${barH}px"></div>
      ${isCurr
        ?'<div class="hist-now-badge">Now</div>'
        :`<div class="hist-date-lbl">${histFormatDate(p.ts)}</div>`
      }
    </div>`;
  }).join('');

  // Build SVG connecting line between bar tops
  // We'll position it after DOM insert via JS because we need rendered widths
  const trendHtml=trend?`<div class="hist-level-trend" style="color:${trend.cls==='up'?'var(--signal)':trend.cls==='down'?'var(--noise)':'var(--text-faint)'}">${trend.label}</div>`:'';

  container.innerHTML=`
    <div class="hist-level-wrap">
      <div class="hist-level-head">
        <span class="hist-level-label">Your Progress \u2014 This Level</span>
        ${trendHtml}
      </div>
      <div class="hist-sparkline-row" id="histrow${lvIdx}">
        <svg class="hist-sparkline-svg" id="histsvg${lvIdx}" aria-hidden="true"></svg>
        ${cols}
      </div>
    </div>`;

  // Draw connecting SVG line after paint
  requestAnimationFrame(()=>{
    const row=$('histrow'+lvIdx);
    const svg=$('histsvg'+lvIdx);
    if(!row||!svg)return;
    const rowRect=row.getBoundingClientRect();
    // Guard: skip SVG draw if row has no rendered width (e.g. hidden iframe)
    if(!rowRect.width)return;
    const colEls=row.querySelectorAll('.hist-session-col');
    if(colEls.length<2)return;
    // Get center-x and bar-top-y for each column
    const points=[...colEls].map(col=>{
      const bar=col.querySelector('.hist-bar');
      if(!bar)return null;
      const cr=col.getBoundingClientRect();
      const br=bar.getBoundingClientRect();
      return{
        x:cr.left-rowRect.left+cr.width/2,
        y:br.top-rowRect.top
      };
    }).filter(Boolean);
    if(points.length<2)return;
    const d=points.map((p,i)=>(i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
    svg.innerHTML=`<path class="hist-spark-path current" d="${d}"/>`;
  });
}

// ── Final screen history panel ────────────────────────────────
function renderFinalHistory(currentOverall,currentLevels){
  const container=$('histfinal');
  if(!container)return;

  const history=histLoad(); // previous sessions (not including this one yet)

  // Build display list: show current first, then prev sessions newest→oldest
  const displaySessions=[
    {ts:Date.now(),overall:currentOverall,levels:currentLevels,isCurrent:true},
    ...history.slice(0,HIST_MAX-1).map(s=>({...s,isCurrent:false}))
  ];

  if(displaySessions.length<2){
    // No previous sessions — show a gentle first-time message
    container.innerHTML=`
      <p class="hist-final-title">Session History</p>
      <p class="hist-no-history">Your history will appear here after your second session.</p>`;
    return;
  }

  // Overall trend badge
  const prev=displaySessions[1];
  const trend=histTrendArrow(currentOverall,prev.overall);
  const trendHtml=trend?`<div class="hist-trend-badge ${trend.cls}">${trend.label} since last session</div>`:'';

  const rows=displaySessions.map((s,i)=>{
    const lvChips=LEVELS.map((lv,li)=>{
      const sc=s.levels&&s.levels[li]!=null?s.levels[li]:null;
      if(sc==null)return`<span class="hist-lv-chip">L${li+1} —</span>`;
      return`<span class="hist-lv-chip${sc>=70?' good':''}">${lv.name.split(' ')[0]}: ${sc}</span>`;
    }).join('');

    const grade=scoreGrade(s.overall);
    return`
      <div class="hist-session-row${s.isCurrent?' is-current':''}">
        <div class="hist-row-top">
          <span class="hist-row-score" style="color:${grade.color}">${s.overall}</span>
          <div class="hist-row-meta">
            <span class="hist-row-date">${histFormatDate(s.ts)}</span>
            <span class="hist-row-tag ${s.isCurrent?'now':'prev'}">${s.isCurrent?'This session':'Previous'}</span>
          </div>
        </div>
        <div class="hist-level-chips">${lvChips}</div>
      </div>`;
  }).join('');

  container.innerHTML=`
    <p class="hist-final-title">Session History</p>
    ${trendHtml}
    ${rows}`;
}

buildSlides();
$('progFill').style.width='0%';
</script>
